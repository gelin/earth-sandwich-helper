name: Build web app

on:
  push:
    branches: [ main ]
    tags: [ 'v*', 'release-*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  webapp:
    name: Build Svelte SPA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          npm ci || npm install

      - name: Build webapp
        run: |
          npm run build

      - name: Archive build
        run: |
          zip -r earch-sandwich-helper.zip build/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: earch-sandwich-helper.zip
          if-no-files-found: error

      - name: Attach to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            earch-sandwich-helper.zip
          fail_on_unmatched_files: true
